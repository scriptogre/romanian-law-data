name: sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      max_acts:
        description: "Cap total acts (for smoke runs). Leave empty for full sync."
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ETL_MAX_ACTS: ${{ inputs.max_acts }}
      ETL_CONCURRENCY: "12"
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync

      - name: Collect
        run: uv run python -m scripts.collect

      - name: Normalize → Parse → Export parquet
        run: |
          uv run python -m scripts.normalize \
            | uv run python -m scripts.parse \
            | uv run python -m scripts.export

      - name: Build FTS index
        run: uv run python -m scripts.build_fts

      - name: Prepare release files + manifest
        id: prep
        run: |
          cp create_views.sql data/create_views.sql
          cd data
          zstd -3 -f --quiet --rm fts.duckdb -o fts.duckdb.zst
          sha256sum acte.parquet articole.parquet alineate.parquet fts.duckdb.zst create_views.sql > laws.sha256
          echo "tag=laws/$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Check whether manifest changed vs latest release
        id: digest_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_URL=$(gh release view --json assets --jq '.assets[] | select(.name=="laws.sha256") | .url' 2>/dev/null || true)
          if [ -n "$LATEST_URL" ]; then
            LATEST_MANIFEST=$(curl -sL "$LATEST_URL")
            if [ "$LATEST_MANIFEST" = "$(cat data/laws.sha256)" ]; then
              echo "unchanged=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "unchanged=false" >> "$GITHUB_OUTPUT"

      - name: Compute release stats
        if: steps.digest_check.outputs.unchanged != 'true'
        id: stats
        run: |
          uv run python -c "
          import duckdb
          c = duckdb.connect()
          row = c.execute('''
              SELECT
                  (SELECT count(*) FROM read_parquet(\"data/acte.parquet\")) AS acte,
                  (SELECT count(*) FROM read_parquet(\"data/articole.parquet\")) AS articole,
                  (SELECT count(*) FROM read_parquet(\"data/alineate.parquet\")) AS alineate,
                  (SELECT max(published_at) FROM read_parquet(\"data/acte.parquet\")) AS latest
          ''').fetchone()
          for k, v in zip(['acte', 'articole', 'alineate', 'latest'], row):
              print(f'{k}={v}')
          " >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: steps.digest_check.outputs.unchanged != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.prep.outputs.tag }}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          cd data
          gh release create "$TAG" \
            acte.parquet articole.parquet alineate.parquet fts.duckdb.zst create_views.sql laws.sha256 \
            --title "$TAG" \
            --notes "$(cat <<EOF
          Romanian legal corpus snapshot.

          **Last published act:** ${{ steps.stats.outputs.latest }}

          ### Counts
          - ${{ steps.stats.outputs.acte }} acte
          - ${{ steps.stats.outputs.articole }} articole
          - ${{ steps.stats.outputs.alineate }} alineate

          ### Assets
          - \`acte.parquet\` / \`articole.parquet\` / \`alineate.parquet\` — zstd-compressed Parquet
          - \`fts.duckdb.zst\` — BM25 index (Romanian Snowball stemmer); consumer decompresses to \`fts.duckdb\`
          - \`create_views.sql\` — DuckDB view definitions matching the data shape
          - \`laws.sha256\` — \`sha256sum\`-compatible manifest
          EOF
          )"

      - name: Upload parse report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: parse-report
          path: data/parse_report.jsonl
          if-no-files-found: ignore
