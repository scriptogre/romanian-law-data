name: sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      max_acts:
        description: "Cap total acts (for smoke runs). Leave empty for full sync."
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ETL_MAX_ACTS: ${{ inputs.max_acts }}
      # GitHub Actions runners (ubuntu-latest) handle SOAP I/O concurrency well
      # past CPU count since the work is network-bound. 24 is empirically safe
      # against legislatie.just.ro's implicit rate-limit; bump higher if logs
      # show no retry storms and we want faster collect.
      ETL_CONCURRENCY: "24"
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: false

      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync

      - name: Collect
        run: uv run python -m scripts.collect

      - name: Normalize → Parse → Export parquet
        run: |
          uv run python -m scripts.normalize \
            | uv run python -m scripts.parse \
            | uv run python -m scripts.export

      - name: Build FTS index
        run: uv run python -m scripts.build_fts

      - name: Bundle artifact
        id: bundle
        run: |
          cp create_views.sql data/create_views.sql
          tar -czvf laws.tar.gz -C data \
            acte.parquet articole.parquet alineate.parquet fts.duckdb create_views.sql
          NEW_SHA=$(sha256sum laws.tar.gz | awk '{print $1}')
          echo "sha=$NEW_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=laws/$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Check whether digest changed vs latest release
        id: digest_check
        run: |
          set +e
          LATEST_SHA=$(gh release view --json assets --jq '.assets[] | select(.name=="laws.sha256") | .url' 2>/dev/null \
            | xargs -r -I{} curl -sL "{}")
          if [ "$LATEST_SHA" = "${{ steps.bundle.outputs.sha }}" ]; then
            echo "unchanged=true" >> "$GITHUB_OUTPUT"
          else
            echo "unchanged=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release stats
        if: steps.digest_check.outputs.unchanged != 'true'
        id: stats
        run: |
          uv run python -c "
          import duckdb
          c = duckdb.connect()
          row = c.execute('''
              SELECT
                  (SELECT count(*) FROM read_parquet(\"data/acte.parquet\")) AS acte,
                  (SELECT count(*) FROM read_parquet(\"data/articole.parquet\")) AS articole,
                  (SELECT count(*) FROM read_parquet(\"data/alineate.parquet\")) AS alineate,
                  (SELECT max(published_at) FROM read_parquet(\"data/acte.parquet\")) AS latest
          ''').fetchone()
          for k, v in zip(['acte', 'articole', 'alineate', 'latest'], row):
              print(f'{k}={v}')
          " >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: steps.digest_check.outputs.unchanged != 'true'
        run: |
          echo "${{ steps.bundle.outputs.sha }}" > laws.sha256
          BUNDLE_SIZE=$(du -h laws.tar.gz | cut -f1)
          gh release create "${{ steps.bundle.outputs.tag }}" \
            laws.tar.gz laws.sha256 \
            --title "${{ steps.bundle.outputs.tag }}" \
            --notes "$(cat <<EOF
          Romanian legal corpus snapshot.

          **Last published act:** ${{ steps.stats.outputs.latest }}
          **Bundle size:** $BUNDLE_SIZE (zstd-compressed parquet + BM25 index)

          ### Counts
          - ${{ steps.stats.outputs.acte }} acte
          - ${{ steps.stats.outputs.articole }} articole
          - ${{ steps.stats.outputs.alineate }} alineate
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload parse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parse-report
          path: data/parse_report.jsonl
          if-no-files-found: ignore
